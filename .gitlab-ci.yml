stages:
 - build
 - deploy
 - notify

variables:
 DOCKER_DRIVER: overlay2
 DOCKER_TLS_CERTDIR: ""
 DOCKER_HOST: tcp://docker:2375
 CI_REGISTRY_IMAGE: ${CI_REGISTRY}/${CI_PROJECT_PATH}
 VERSION: ${CI_COMMIT_SHORT_SHA}
 POSTGRES_ROOT_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
 POSTGRES_DATABASE: ${POSTGRES_DATABASE}
 POSTGRES_USER: ${POSTGRES_USER}
 POSTHRES_PASSWORD: ${POSTGRES_PASSWORD}
 REDMINE_SECRET_POSTGRES: ${REDMINE_SECRET_POSTGRES}

build:
 stage: build
 image: docker:24.0.7
 services:
  - docker:dind
 before_script:
  - apk add --no-cache bash curl
 script:
  - echo "=== Building Docker Image ==="


  - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password                                                                                       -stdin $CI_REGISTRY


  - |
    if docker manifest inspect $CI_REGISTRY_IMAGE/redmine:${VERSION} > /dev/null                                                                                        2>&1; then
     echo "Image already exists, skipping build"
     exit 0
    fi


  - |
    docker build \
     --cache-from $CI_REGISTRY_IMAGE/redmine:latest \
     -t $CI_REGISTRY_IMAGE/redmine:${VERSION} \
     -t $CI_REGISTRY_IMAGE/redmine:latest \
     -f Dockerfile.redmine .

  - docker push $CI_REGISTRY_IMAGE/redmine:${VERSION}
  - docker push $CI_REGISTRY_IMAGE/redmine:latest

  - echo "Build completed"

deploy:
 stage: deploy
 image: docker:24.0.7
 before_script:
  - apk add --no-cache openssh-client bash curl docker-compose
  - eval $(ssh-agent -s)
  - echo "${SSH_PRIVATE_KEY}" | tr -d '\r' | ssh-add - > /dev/null
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
 script:
  - echo "=== Deploying to Yandex Cloud ==="

  - |
    ssh -o StrictHostKeyChecking=no ${SSH_USER}@${VM_IP} "mkdir -p /opt/redmine-s                                                                                       tack"
    scp -o StrictHostKeyChecking=no docker-compose.yml ${SSH_USER}@${VM_IP}:/opt/                                                                                       redmine-stack/
    scp -o StrictHostKeyChecking=no .env ${SSH_USER}@${VM_IP}:/opt/redmine-stack/                                                                                        2>/dev/null

  - |
    ssh -o StrictHostKeyChecking=no ${SSH_USER}@${VM_IP} << EOF
     cd /opt/redmine-stack

     if ! command -v docker &> /dev/null; then
      echo "Installing Docker..."
      curl -fsSL https://get.docker.com -o get-docker.sh
      sudo sh get-docker.sh
      sudo usermod -aG docker \$USER
     fi

     if ! command -v docker-compose &> /dev/null; then
      echo "Installing Docker Compose..."
      curl -L "https://github.com/docker/compose/releases/download/v2.23.0/docker                                                                                       -compose-linux-x86_64"
      sudo chmod +x /usr/local/bin/docker-compose
     fi


     echo "${CI_REGISTRY_PASSWORD}" | docker login -u "${CI_REGISTRY_USER}" --pas                                                                                       sword-stdin $CI_REGISTRY
     sed -i "s|image: redmine:5.0-alpine|image: ${CI_REGISTRY_IMAGE}/redmine:${VE                                                                                       RSION}"

     docker-compose down 2>/dev/null || true
     docker-compose up -d

     sleep 10
     docker-compose ps

     echo "Deployment completed"

  - echo "Deploy finished"
 when: manual

telegram_notify:
 stage: notify
 image: alpine:latest
 before_script:
  - apk add --no-cache curl
 script:
  - |
    if [ "${CI_JOB_STATUS}" == "success" ]; then
     STATUS="SUCCESS"
    else
     STATUS="FAILED"
    fi

    MESSAGE="${EMOJI} Pipeline ${STATUS}"
    MESSAGE+="Project: ${CI_PROJECT_NAME}"
    MESSAGE+="Stage: ${CI_JOB_STAGE}"
    MESSAGE+="Branch: ${CI_COMMIT_BRANCH}"
    MESSAGE+="Commit: ${CI_COMMIT_SHORT_SHA}"
    MESSAGE+="Version: ${VERSION}"
    MESSAGE+="Status: ${CI_JOB_STATUS}"
    MESSAGE+="URL: ${CI_PIPELINE_URL}"

    curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage                                                                                       e" \
     -d "chat_id=${TELEGRAM_CHAT_ID}" \
     -d "text=${MESSAGE}" \
     -d "parse_mode=HTML"

    echo "Telegram notification sent"
 when: always
 needs:
  - build
  - deploy
